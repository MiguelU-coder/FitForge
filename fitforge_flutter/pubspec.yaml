name: fitforge
description: AI-powered workout tracker
publish_to: "none"
version: 2.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0
  flutter_secure_storage: ^9.2.2
  go_router: ^14.3.0
  flutter_animate: ^4.5.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.69.0
  intl: ^0.19.0
  equatable: ^2.0.5
  google_fonts: ^8.0.2
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  flutter_dotenv: ^5.2.1
  supabase_flutter: ^2.8.0
  muscle_selector: ^1.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.4
  freezed: ^2.5.7
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env
